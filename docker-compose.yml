services:
  revolut-ynab-bot:
    image: ghcr.io/cyrill-meier/ynab_helper:latest
    container_name: revolut-ynab-bot
    restart: unless-stopped
    volumes:
      # Your .env file with secrets (create on the host, NOT from Git)
      - ./bot.env:/app/.env:ro
      # Persistent storage for user DB + per-user transaction DBs
      - ./bot_data:/app/bot_data
    environment:
      - TZ=Europe/Zurich
      - PYTHONUNBUFFERED=1
    # The web UI listens on 8080 inside the container. Caddy below reaches
    # it over the internal compose network; we deliberately do NOT publish
    # that port to the host.
    labels:
      - "com.centurylinklabs.watchtower.scope=ynab"

  # ── Caddy reverse proxy ───────────────────────────────────────────────
  # Terminates TLS on ports 80/443 and forwards traffic to the bot's web
  # UI on the internal docker network. Auto-provisions and renews
  # Let's Encrypt certificates — no certbot, no nginx.conf reloads.
  #
  # REQUIREMENTS:
  #   1. The DNS record for the public hostname (e.g. bot.example.com)
  #      must point at this host's public IP.
  #   2. Inbound TCP 80 + TCP 443 must be open in your cloud firewall
  #      (AWS Security Group / Lightsail Networking tab / Hetzner cloud
  #      firewall / etc.). Port 80 is required for Let's Encrypt's
  #      HTTP-01 challenge; you cannot skip it.
  #
  # The Caddyfile next to this compose file declares which hostnames are
  # served and where they proxy to.
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persisting these keeps the issued cert across restarts so we
      # don't hit Let's Encrypt's per-week rate limits.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - revolut-ynab-bot
    labels:
      - "com.centurylinklabs.watchtower.scope=ynab"

  # ── Auto-update ───────────────────────────────────────────────────────
  # Pulls new bot images and restarts the bot/caddy automatically.
  watchtower:
    # nickfedor/watchtower keeps its Docker SDK current; the upstream
    # containrrr image still ships an API v1.25 client which Docker
    # 25+ rejects with "client version 1.25 is too old. Minimum
    # supported API version is 1.40."
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for new images every 5 minutes
      - WATCHTOWER_POLL_INTERVAL=300
      # Only update containers with the "ynab" scope label
      - WATCHTOWER_SCOPE=ynab
      - TZ=Europe/Zurich
    labels:
      - "com.centurylinklabs.watchtower.scope=ynab"

volumes:
  caddy_data:
  caddy_config:
